kind = "web"
previewPath = "/"
title = "POSTAPP"
version = "1.0.0"
id = "artifacts/postapp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20424

[services.development]
run = "pnpm --filter @workspace/postapp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/postapp", "run", "build" ]
publicDir = "artifacts/postapp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20424"
BASE_PATH = "/"
