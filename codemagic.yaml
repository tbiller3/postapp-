workflows:
  ios-release:
    name: POSTAPP iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: 18
      cocoapods: default
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.tbiller.postapp"
        XCODE_SCHEME: App
        XCODE_WORKSPACE: ios/App/App.xcworkspace
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set custom app icon
        script: |
          ICON_SET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_SET"
          SIZES="20 29 40 58 60 76 80 87 120 152 167 180 1024"
          for SIZE in $SIZES; do
            sips -z $SIZE $SIZE AppIcon-1024.png --out "$ICON_SET/icon-${SIZE}.png" > /dev/null 2>&1
          done
          cat > "$ICON_SET/Contents.json" << 'ICONJSON'
          {
            "images": [
              {"size":"20x20","idiom":"iphone","filename":"icon-40.png","scale":"2x"},
              {"size":"20x20","idiom":"iphone","filename":"icon-60.png","scale":"3x"},
              {"size":"29x29","idiom":"iphone","filename":"icon-58.png","scale":"2x"},
              {"size":"29x29","idiom":"iphone","filename":"icon-87.png","scale":"3x"},
              {"size":"40x40","idiom":"iphone","filename":"icon-80.png","scale":"2x"},
              {"size":"40x40","idiom":"iphone","filename":"icon-120.png","scale":"3x"},
              {"size":"60x60","idiom":"iphone","filename":"icon-120.png","scale":"2x"},
              {"size":"60x60","idiom":"iphone","filename":"icon-180.png","scale":"3x"},
              {"size":"20x20","idiom":"ipad","filename":"icon-20.png","scale":"1x"},
              {"size":"20x20","idiom":"ipad","filename":"icon-40.png","scale":"2x"},
              {"size":"29x29","idiom":"ipad","filename":"icon-29.png","scale":"1x"},
              {"size":"29x29","idiom":"ipad","filename":"icon-58.png","scale":"2x"},
              {"size":"40x40","idiom":"ipad","filename":"icon-40.png","scale":"1x"},
              {"size":"40x40","idiom":"ipad","filename":"icon-80.png","scale":"2x"},
              {"size":"76x76","idiom":"ipad","filename":"icon-76.png","scale":"1x"},
              {"size":"76x76","idiom":"ipad","filename":"icon-152.png","scale":"2x"},
              {"size":"83.5x83.5","idiom":"ipad","filename":"icon-167.png","scale":"2x"},
              {"size":"1024x1024","idiom":"ios-marketing","filename":"icon-1024.png","scale":"1x"}
            ],
            "info":{"version":1,"author":"xcode"}
          }
          ICONJSON
          echo "Custom app icon set with $(ls $ICON_SET/*.png | wc -l) sizes"
      - name: Set build number and export compliance
        script: |
          BUILD_NUM=$(($(date +%s) / 60))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ios/App/App/Info.plist
          echo "Build number set to $BUILD_NUM"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" ios/App/App/Info.plist
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.tbiller.postapp" \
            --type IOS_APP_STORE \
            --create
      - name: Set up keychain
        script: keychain initialize
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Apply provisioning profiles
        script: xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
