workflows:
  ios-workflow:
    name: POSTAPP iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.tbiller.postapp"
        XCODE_SCHEME: App
        XCODE_WORKSPACE: ios/App/App.xcworkspace
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add iOS platform
        script: |
          set -e
          npx cap add ios 2>&1 || true
          echo "iOS platform dir:"
          ls ios/ 2>/dev/null || echo "ios/ does not exist"
      - name: Sync Capacitor
        script: |
          set -e
          npx cap sync ios
          echo "After sync - workspace check:"
          ls ios/App/App.xcworkspace 2>/dev/null && echo "WORKSPACE EXISTS" || echo "WORKSPACE MISSING"
      - name: Install CocoaPods
        script: |
          set -e
          cd ios/App
          pod install --repo-update
          cd ../..
      - name: Bump build number
        script: |
          set -e
          BUILD_NUM=$(($(date +%s) / 60))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ios/App/App/Info.plist 2>/dev/null             || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUM" ios/App/App/Info.plist
          echo "BUILD_NUMBER=$BUILD_NUM" >> $CM_ENV
      - name: Add usage descriptions
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'This app does not use the camera.'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'This app does not access your photo library.'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'This app does not use the microphone.'" "$PLIST" 2>/dev/null || true
      - name: Set up keychain and signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID"             --type IOS_APP_STORE             --certificate-key=@env:CERTIFICATE_PRIVATE_KEY             --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build and export IPA
        script: |
          set -e
          echo "Workspace contents:"
          ls -la ios/App/App.xcworkspace/ 2>/dev/null || echo "Workspace missing"
          xcode-project build-ipa             --workspace "$XCODE_WORKSPACE"             --scheme "$XCODE_SCHEME"             --export-options-plist export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false