workflows:
  ios-workflow:
    name: POSTAPP iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.tbiller.postapp"
        XCODE_SCHEME: App
        XCODE_WORKSPACE: ios/App/App.xcworkspace
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Generate app icon
        script: |
          set -e
          SRC="AppIcon-1024.png"
          DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$DIR"
          # Generate all required iOS icon sizes using sips (macOS built-in)
          sips -z 40   40   "$SRC" --out "$DIR/Icon-20@2x.png"
          sips -z 60   60   "$SRC" --out "$DIR/Icon-20@3x.png"
          sips -z 58   58   "$SRC" --out "$DIR/Icon-29@2x.png"
          sips -z 87   87   "$SRC" --out "$DIR/Icon-29@3x.png"
          sips -z 80   80   "$SRC" --out "$DIR/Icon-40@2x.png"
          sips -z 120  120  "$SRC" --out "$DIR/Icon-40@3x.png"
          sips -z 120  120  "$SRC" --out "$DIR/Icon-60@2x.png"
          sips -z 180  180  "$SRC" --out "$DIR/Icon-60@3x.png"
          sips -z 76   76   "$SRC" --out "$DIR/Icon-76@1x.png"
          sips -z 152  152  "$SRC" --out "$DIR/Icon-76@2x.png"
          sips -z 167  167  "$SRC" --out "$DIR/Icon-83.5@2x.png"
          sips -z 1024 1024 "$SRC" --out "$DIR/Icon-1024.png"
          # Write Contents.json
          cat > "$DIR/Contents.json" << 'JSON'
          {
            "images": [
              {"size":"20x20","idiom":"iphone","filename":"Icon-20@2x.png","scale":"2x"},
              {"size":"20x20","idiom":"iphone","filename":"Icon-20@3x.png","scale":"3x"},
              {"size":"29x29","idiom":"iphone","filename":"Icon-29@2x.png","scale":"2x"},
              {"size":"29x29","idiom":"iphone","filename":"Icon-29@3x.png","scale":"3x"},
              {"size":"40x40","idiom":"iphone","filename":"Icon-40@2x.png","scale":"2x"},
              {"size":"40x40","idiom":"iphone","filename":"Icon-40@3x.png","scale":"3x"},
              {"size":"60x60","idiom":"iphone","filename":"Icon-60@2x.png","scale":"2x"},
              {"size":"60x60","idiom":"iphone","filename":"Icon-60@3x.png","scale":"3x"},
              {"size":"76x76","idiom":"ipad","filename":"Icon-76@1x.png","scale":"1x"},
              {"size":"76x76","idiom":"ipad","filename":"Icon-76@2x.png","scale":"2x"},
              {"size":"83.5x83.5","idiom":"ipad","filename":"Icon-83.5@2x.png","scale":"2x"},
              {"size":"1024x1024","idiom":"ios-marketing","filename":"Icon-1024.png","scale":"1x"}
            ],
            "info":{"version":1,"author":"xcode"}
          }
          JSON
          echo "Icons generated successfully"
          ls -la "$DIR"
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          cd ../..
      - name: Bump build number and version
        script: |
          set -e
          BUILD_NUM=$(($(date +%s) / 60))
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUM" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.3" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.3" "$PLIST"
          echo "BUILD_NUMBER=$BUILD_NUM" >> $CM_ENV
          echo "Set version 1.3, build $BUILD_NUM"
      - name: Add usage descriptions
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'This app does not use the camera.'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'This app does not access your photo library.'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'This app does not use the microphone.'" "$PLIST" 2>/dev/null || true
      - name: Set up keychain and signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build and export IPA
        script: |
          set -e
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
