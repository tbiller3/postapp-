openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: POSTAPP API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: apps
    description: App management operations
  - name: checklist
    description: App Store checklist operations
  - name: revisions
    description: Revision notes operations
  - name: workspace
    description: Workspace app discovery
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /workspace-apps:
    get:
      operationId: listWorkspaceApps
      tags: [workspace]
      summary: List apps discovered from the Replit workspace
      responses:
        "200":
          description: List of workspace-discovered apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceApp"

  /apps:
    get:
      operationId: listApps
      tags: [apps]
      summary: List all apps
      responses:
        "200":
          description: List of apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/App"
    post:
      operationId: createApp
      tags: [apps]
      summary: Create an app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppBody"
      responses:
        "201":
          description: App created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"

  /apps/{id}:
    get:
      operationId: getApp
      tags: [apps]
      summary: Get an app by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: App found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"
        "404":
          description: App not found
    patch:
      operationId: updateApp
      tags: [apps]
      summary: Update an app
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppBody"
      responses:
        "200":
          description: App updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"
        "404":
          description: App not found
    delete:
      operationId: deleteApp
      tags: [apps]
      summary: Delete an app
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: App deleted
        "404":
          description: App not found

  /apps/{id}/revisions:
    get:
      operationId: listRevisions
      tags: [revisions]
      summary: List revisions for an app
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of revisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Revision"
    post:
      operationId: createRevision
      tags: [revisions]
      summary: Add a revision note to an app
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRevisionBody"
      responses:
        "201":
          description: Revision created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revision"

  /apps/{id}/checklist:
    get:
      operationId: getChecklist
      tags: [checklist]
      summary: Get App Store checklist for an app
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checklist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChecklistItem"

  /checklist/{itemId}:
    patch:
      operationId: updateChecklistItem
      tags: [checklist]
      summary: Update a checklist item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChecklistItemBody"
      responses:
        "200":
          description: Checklist item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistItem"
        "404":
          description: Item not found

  /apps/summary:
    get:
      operationId: getAppsSummary
      tags: [apps]
      summary: Get summary counts of apps by status
      responses:
        "200":
          description: Summary of app statuses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppsSummary"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    App:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        platform:
          type: string
        status:
          type: string
        description:
          type: ["string", "null"]
        bundleId:
          type: ["string", "null"]
        version:
          type: ["string", "null"]
        buildNumber:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        subtitle:
          type: ["string", "null"]
        ageRating:
          type: ["string", "null"]
        keywords:
          type: ["string", "null"]
        supportUrl:
          type: ["string", "null"]
        privacyPolicyUrl:
          type: ["string", "null"]
        reviewNotes:
          type: ["string", "null"]
        replitUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - platform
        - status
        - description
        - bundleId
        - version
        - buildNumber
        - category
        - subtitle
        - ageRating
        - keywords
        - supportUrl
        - privacyPolicyUrl
        - reviewNotes
        - replitUrl
        - createdAt
        - updatedAt

    CreateAppBody:
      type: object
      properties:
        name:
          type: string
        platform:
          type: string
        status:
          type: string
        description:
          type: ["string", "null"]
        bundleId:
          type: ["string", "null"]
        version:
          type: ["string", "null"]
        buildNumber:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        subtitle:
          type: ["string", "null"]
        ageRating:
          type: ["string", "null"]
        keywords:
          type: ["string", "null"]
        supportUrl:
          type: ["string", "null"]
        privacyPolicyUrl:
          type: ["string", "null"]
        replitUrl:
          type: ["string", "null"]
      required:
        - name
        - platform
        - status

    UpdateAppBody:
      type: object
      properties:
        name:
          type: string
        platform:
          type: string
        status:
          type: string
        description:
          type: ["string", "null"]
        bundleId:
          type: ["string", "null"]
        version:
          type: ["string", "null"]
        buildNumber:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        subtitle:
          type: ["string", "null"]
        ageRating:
          type: ["string", "null"]
        keywords:
          type: ["string", "null"]
        supportUrl:
          type: ["string", "null"]
        privacyPolicyUrl:
          type: ["string", "null"]
        reviewNotes:
          type: ["string", "null"]
        replitUrl:
          type: ["string", "null"]

    Revision:
      type: object
      properties:
        id:
          type: integer
        appId:
          type: integer
        note:
          type: string
        source:
          type: string
        resolved:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - appId
        - note
        - source
        - resolved
        - createdAt

    CreateRevisionBody:
      type: object
      properties:
        note:
          type: string
        source:
          type: string
      required:
        - note
        - source

    ChecklistItem:
      type: object
      properties:
        id:
          type: integer
        appId:
          type: integer
        label:
          type: string
        completed:
          type: boolean
        category:
          type: string
      required:
        - id
        - appId
        - label
        - completed
        - category

    UpdateChecklistItemBody:
      type: object
      properties:
        completed:
          type: boolean
      required:
        - completed

    AppsSummary:
      type: object
      properties:
        total:
          type: integer
        draft:
          type: integer
        inReview:
          type: integer
        needsRevision:
          type: integer
        readyForSubmission:
          type: integer
        approved:
          type: integer
      required:
        - total
        - draft
        - inReview
        - needsRevision
        - readyForSubmission
        - approved

    WorkspaceApp:
      type: object
      properties:
        slug:
          type: string
        title:
          type: string
        kind:
          type: string
        previewPath:
          type: string
        alreadyImported:
          type: boolean
      required:
        - slug
        - title
        - kind
        - previewPath
        - alreadyImported

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
